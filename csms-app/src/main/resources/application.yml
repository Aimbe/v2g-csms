spring:
  application:
    name: charging-domain

  # MySQL 데이터소스 설정 (default)
  datasource:
    url: jdbc:mysql://localhost:3306/csms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: csms
    password: csms1234
    driver-class-name: com.mysql.cj.jdbc.Driver

    # 커넥션 풀 설정 (HikariCP)
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        globally_quoted_identifiers: true
        jdbc:
          batch_size: 20
        default_batch_fetch_size: 100

    show-sql: true

  # Flyway 설정
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

app:
  kafka:
    topics:
      transaction: ${APP_KAFKA_TOPIC_TRANSACTION:ocpp.transaction.v1}
      metering: ${APP_KAFKA_TOPIC_METERING:ocpp.meter-value.v1}
      v2g-needs: ${APP_KAFKA_TOPIC_V2G_NEEDS:ocpp.v2g.charging-needs.v1}
      v2g-schedule: ${APP_KAFKA_TOPIC_V2G_SCHEDULE:ocpp.v2g.charging-schedule.v1}
  outbox:
    relay:
      enabled: ${APP_OUTBOX_RELAY_ENABLED:false}
      fixed-delay-ms: ${APP_OUTBOX_RELAY_FIXED_DELAY_MS:1000}
      batch-size: ${APP_OUTBOX_RELAY_BATCH_SIZE:100}
      max-retry-count: ${APP_OUTBOX_RELAY_MAX_RETRY_COUNT:5}
  dashboard:
    projection:
      enabled: ${APP_DASHBOARD_PROJECTION_ENABLED:true}
      consumer:
        enabled: ${APP_DASHBOARD_PROJECTION_CONSUMER_ENABLED:false}
  v2g:
    orchestrator:
      consumer:
        enabled: ${APP_V2G_ORCHESTRATOR_CONSUMER_ENABLED:false}

# 로깅 설정
logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.orm.jdbc.bind: TRACE
    com.charging: DEBUG
    org.springframework.web: INFO
    org.springframework.data: INFO

---
# 개발 환경 프로파일
spring:
  config:
    activate:
      on-profile: dev

  # H2 Database 설정 (개발 환경 테스트용)
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # H2 콘솔 활성화
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # Flyway 비활성화 (dev 프로파일)
  flyway:
    enabled: false

---
# 운영 환경 프로파일
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:csms}?useSSL=true&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:csms}
    password: ${DB_PASSWORD:csms1234}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true

logging:
  level:
    root: WARN
    com.charging: INFO
    org.hibernate.SQL: INFO
